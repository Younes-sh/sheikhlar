<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sheikhlar</title>
</head>
<body>
    
    
<div class="container">
    <div class="title-container">
        <h1 >✨ روانشاد ولی شیخلر ✨</h1>
    </div>
    <div class="row">
        <div class="col">
            <div class="image">
                <img src="ValiSheikhlar.jpg" alt="مرحوم ولی شیخلر" onerror="this.src='https://via.placeholder.com/500x600?text=عکس+یادبود'">
            </div>
        </div>
        <div class="col">
            <div class="text">
                <div class="LifeHistory">
                    <p>📅 از حق: ۱۰ / شهریور / ۱۳۳۰</p>
                    <p>🕊️ به حق: ۲ / بهمن / ۱۴۰۳</p>
                </div>

                <p style="font-size: 1rem; margin-bottom: 0.5rem;">⏳ از تاریخ ۲ بهمن ۱۴۰۳ ساعت ۱۱ صبح تا کنون</p>
                
                <!-- بخش زمان دقیق با طراحی کارتی -->
                <div dir="rtl" class="ElapsedTime" id="time-cards-container">
                    <!-- توسط js داینامیک پر می‌شه ولی ساختار ثابت رو از قبل میسازیم برای نمایش بهتر -->
                </div>

                <div class="total-days-box">
                    📆 کل روزهای سپری‌شده: <span id="total-days">۰</span>
                </div>

                <div class="poem">
                    <h3>صد بار خدا مرثیه خوان کرد مرا</h3>
                    <h3>در بوته صبر امتحان کرد مرا</h3>
                    <h3>هرگز نشکست پشتم از هیچ غمی</h3>
                    <h3>جز مرگ پدر که ناتوان کرد مرا</h3>
                </div>
            </div>
        </div>
    </div>
    <div class="note">یادش گرامی، روحش شاد </div>
</div>

    <!-- محاسبه دقیق فاصله بین دو تاریخ شمسی (جلالی) و نمایش آن به صورت سال، ماه و روز، Jalali Moment  -->
    <script src="https://unpkg.com/jalali-moment/dist/jalali-moment.browser.js"></script>

    <script src="index.js"></script>
</body>
</html>
